<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BistroMaster PRO - Menú Digital</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="logo"><i class="fas fa-utensils"></i> BistroMaster <span class="text-gradient">PRO</span></div>
        <div class="nav-actions">
            <button class="btn btn-outline" id="view-cart-btn"><i class="fas fa-shopping-cart"></i> Carrito (<span id="cart-count">0</span>)</button>
            <a href="admin.html" class="btn btn-primary"><i class="fas fa-user-shield"></i> Personal</a>
        </div>
    </nav>

    <header class="container fade-in" style="margin-top: 4rem; margin-bottom: 4rem;">
        <h1 style="font-size: 3rem; margin-bottom: 1rem; font-weight: 800; letter-spacing: -0.05em;">Experiencia <span class="text-gradient">Gastronómica</span></h1>
        <p style="color: var(--text-muted); font-size: 1.1rem; max-width: 500px; line-height: 1.6;">
            Bienvenidos a la evolución del sabor. Explora nuestro menú diseñado por expertos y realiza tu pedido en segundos.
        </p>
    </header>

    <main class="container">
        <div class="grid" id="menu-container">
            <!-- Items loaded by JS -->
            <div class="glass-card" style="grid-column: 1/-1; text-align: center; padding: 4rem;">
                <i class="fas fa-spinner fa-spin fa-3x" style="color: var(--primary); margin-bottom: 1rem;"></i>
                <p>Preparando el menú del día...</p>
            </div>
        </div>
    </main>

    <!-- Modal de Carrito -->
    <div id="cart-modal" class="modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center;">
        <div class="glass-card" style="width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto; border: none; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 style="font-weight: 800; letter-spacing: -0.02em;">Tu Pedido</h2>
                <button id="close-cart" class="btn btn-outline" style="padding: 0.5rem; border: none;"><i class="fas fa-times"></i></button>
            </div>
            <div id="cart-items" style="margin-bottom: 2rem;">
                <!-- Items de carrito -->
            </div>
            <div style="border-top: 1px solid var(--border); padding-top: 2rem;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem;">
                    <span style="font-size: 1.1rem; font-weight: 600;">Total</span>
                    <span id="cart-total" style="font-size: 1.25rem; font-weight: 800;">$0.00</span>
                </div>
                <input type="text" id="cust-name" placeholder="Tu nombre o número de mesa" style="margin-bottom: 1rem;">
                <button class="btn btn-primary" style="width: 100%; padding: 1rem;" id="checkout-btn">Finalizar Pedido</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
