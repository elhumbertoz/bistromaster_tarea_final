<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BistroMaster PRO - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="logo"><i class="fas fa-chart-line"></i> Dashboard <span class="text-gradient">PRO</span></div>
        <div class="nav-actions">
            <span id="user-display" style="margin-right: 1rem; color: var(--text-muted);"></span>
            <button class="btn btn-outline" id="logout-btn">Salir</button>
        </div>
    </nav>

    <!-- Login Area -->
    <div id="login-container" class="container fade-in" style="display: none; max-width: 400px; margin-top: 5rem;">
        <div class="glass-card">
            <h2 style="margin-bottom: 2rem; text-align: center;">Acceso Staff</h2>
            <input type="text" id="username" placeholder="Usuario">
            <input type="password" id="password" placeholder="Contraseña">
            <button class="btn btn-primary" style="width: 100%;" id="login-btn">Entrar</button>
            <p style="margin-top: 1rem; font-size: 0.8rem; color: var(--text-muted); text-align: center;">Credenciales por defecto: admin / admin123</p>
        </div>
    </div>

    <!-- Admin Area -->
    <div id="admin-container" class="container fade-in" style="display: none; margin-top: 3rem;">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 4rem;">
            <div>
                <h1 style="font-size: 2.5rem; font-weight: 800; letter-spacing: -0.05em;">Gestión <span class="text-gradient">Operativa</span></h1>
                <p style="color: var(--text-muted); font-size: 1rem;">Control en tiempo real de pedidos y catálogo del restaurante.</p>
            </div>
            <div style="display: flex; gap: 1rem;">
                <button class="btn btn-outline" id="refresh-orders-btn"><i class="fas fa-sync"></i> Actualizar</button>
            </div>
        </div>

        <div class="grid" id="orders-dashboard">
            <!-- Orders dashboard loaded by JS -->
        </div>

        <section style="margin-top: 5rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2>Catálogo del Menú</h2>
                <button class="btn btn-primary" id="add-item-btn"><i class="fas fa-plus"></i> Nuevo Ítem</button>
            </div>
            <div class="grid" id="admin-menu-container">
                <!-- Menu management loaded by JS -->
            </div>
        </section>
    </div>

    <!-- Modal Nuevo Item -->
    <div id="item-modal" class="modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center;">
        <div class="glass-card" style="width: 100%; max-width: 420px; border: none; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);">
            <h2 id="modal-title" style="margin-bottom: 2rem; font-weight: 800; letter-spacing: -0.02em;">Añadir al Menú</h2>
            <form id="item-form">
                <input type="text" id="m-name" placeholder="Nombre del plato" required>
                <textarea id="m-desc" placeholder="Descripción" rows="3" required></textarea>
                <input type="number" id="m-price" placeholder="Precio" step="0.01" required>
                <select id="m-cat">
                    <option value="Entrada">Entrada</option>
                    <option value="Fuerte">Plato Fuerte</option>
                    <option value="Postre">Postre</option>
                    <option value="Bebida">Bebida</option>
                </select>
                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button type="button" class="btn btn-outline" style="flex: 1;" id="close-item-modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
